name: Deploy Frontends to GH Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up subsequent runs by caching node_modules

      # 1. Workspace Install (Root)
      # This handles all apps and the shared package in one go
      - name: Install Dependencies
        run: npm install

      # 2. Build Client using Workspace flag
      - name: Build Client
        run: npm run build -w apps/web/client
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}

      # 3. Build Admin using Workspace flag
      - name: Build Admin
        run: npm run build -w apps/web/admin
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}

      # 4. Merge Builds (Clean pathing)
      - name: Merge Builds
        run: |
          mkdir -p final_dist/admin
          # Copy client files to root
          cp -r apps/web/client/dist/* final_dist/
          # Copy admin files to /admin subfolder
          cp -r apps/web/admin/dist/* final_dist/admin/
          # Prevent Jekyll from ignoring files/folders with underscores
          touch final_dist/.nojekyll

      # 5. SPA 404 HACK
      # Crucial for React Router deep links on GitHub Pages
      - name: SPA Fix
        run: |
          cp final_dist/index.html final_dist/404.html
          cp final_dist/admin/index.html final_dist/admin/404.html

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final_dist