name: Deploy Frontends to GH Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # BUILD CLIENT
      - name: Build Client
        run: |
          cd apps/web/client
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}

      # BUILD ADMIN
      - name: Build Admin
        run: |
          cd apps/web/admin
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}

      # MERGE BUILDS (Clean pathing)
      - name: Merge Builds
        run: |
          mkdir -p final_dist/admin
          # Copy client files to root
          cp -r apps/web/client/dist/* final_dist/
          # Copy admin files to /admin subfolder
          cp -r apps/web/admin/dist/* final_dist/admin/
          # Create .nojekyll to prevent GH from ignoring folders starting with underscores
          touch final_dist/.nojekyll

      # SPA 404 HACK
      - name: SPA Fix
        run: |
          cp final_dist/index.html final_dist/404.html
          cp final_dist/admin/index.html final_dist/admin/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final_dist  # Ensure the leading ./ is present